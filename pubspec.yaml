name: sylinq
description: "A production-ready social media platform with AI assistant."
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Storage & Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.1

  # Local Storage & Database
  path_provider: ^2.1.1
  sqflite: ^2.3.0

  # Image & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  video_player: ^2.8.0
  flutter_video_compress: ^0.1.11
  image: ^4.1.0

  # Camera
  camera: ^0.10.5

  # UI & Design
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  lottie: ^2.6.0
  flutter_animate: ^4.1.1

  # Navigation & Routing
  go_router: ^13.2.0

  # Form Validation
  formz: ^0.6.1
  flutter_form_builder: ^9.1.0

  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^16.1.0

  # Real-time
  web_socket_channel: ^2.4.0

  # Utilities
  intl: ^0.19.0
  get_it: ^7.6.0
  uuid: ^4.0.0
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

  # Logging
  logger: ^2.1.0
  talker: ^3.1.1

  # Error Handling
  either_dart: ^1.0.7

  # Permissions
  permission_handler: ^11.4.4

  # Device Info
  device_info_plus: ^10.1.0
  package_info_plus: ^5.0.1

  # Social Sharing
  share_plus: ^7.2.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Video Trimming
  video_trimmer: ^0.7.9

  # Audio Recording
  record: ^4.4.4
  audio_waveforms: ^1.0.5

  # Animations
  flutter_animate: ^4.1.1

  # Time formatting
  timeago: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  freezed: ^2.4.1
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
